version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: inventory-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    container_name: inventory-backend

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/inventory_db

    ports:
      - "8000:8000"

  frontend:
    build: ./frontend

    container_name: inventory-frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data: